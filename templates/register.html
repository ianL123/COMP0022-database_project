<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Register | Movie Strategy DB</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>

<div class="container register-container">
    <div class="card shadow">
        <div class="card-header bg-dark text-white text-center py-3">
            <h4 class="mb-0">🎬 Movie Strategy DB</h4>
            <small class="text-info">Create a new account</small>
        </div>
        <div class="card-body p-4">
            
            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="alert alert-{{ category }} alert-dismissible fade show small" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form action="{{ url_for('user_system.register') }}" method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label small fw-bold text-secondary">Username</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" id="username" placeholder="Choose a username" required>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="password" class="form-label small fw-bold text-secondary">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" id="password" placeholder="Create password" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="confirm_password" class="form-label small fw-bold text-secondary">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="bi bi-check-all"></i></span>
                        <input type="password" name="confirm_password" class="form-control" id="confirm_password" placeholder="Repeat password" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 mb-3">
                    <i class="bi bi-person-plus-fill"></i> Register
                </button>
            </form>

            <div class="text-center">
                <p class="small text-muted mb-0">Already have an account? 
                    <a href="{{ url_for('user_system.login') }}" class="text-decoration-none">Login here</a>
                </p>
            </div>
        </div>
    </div>
    
    <div class="text-center mt-4">
        <a href="/" class="text-muted small text-decoration-none">
            <i class="bi bi-arrow-left"></i> Back to Search Catalogue
        </a>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
