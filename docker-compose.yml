services:
  db:
    image: mysql:latest
    container_name: mysql_server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: my_project_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 1. Mount the script to the auto-run directory
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # 2. Mount the folder containing your CSVs
      - ./ml-latest-small:/var/lib/mysql-files

  web: 
    image: nginx:latest
    container_name: nginx_server
    restart: always
    ports:
      - "80:80"
    depends_on:
      - db

volumes:
  mysql_data: