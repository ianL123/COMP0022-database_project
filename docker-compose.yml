services:
  db:
    image: mysql:latest
    container_name: mysql_server
    restart: always
    command: --innodb_redo_log_capacity=1073741824
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./ml-latest:/var/lib/mysql-files/ml-latest
      - ./personality-isf2018:/var/lib/mysql-files/personality-isf2018

  app:
    build: .
    container_name: python_app
    env_file:
      - .env
    ports:
      - "127.0.0.1:5001:5000"
    depends_on:
      - db

  web:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  mysql_data:
