services:
  db:
    image: mysql:latest
    container_name: mysql_server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: my_project_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # 1. Mount the script to the auto-run directory
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      # 2. Mount the folder containing your CSVs
      - ./ml-latest:/var/lib/mysql-files

  mysql:
    image: mysql:latest
    command: --innodb_redo_log_capacity=1073741824 --max_allowed_packet=64M
  
  app:
    build: .
    container_name: python_app
    depends_on:
      - db
    ports:
      - "5001:5000"  # This maps your computer's 5000 to the container's 5000
    environment:
      - DATABASE_URL=mysql+pymysql://root:password123@db:3306/my_project_db
    # We don't need to expose 5000 to the host, only Nginx needs to see it

  web: 
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  mysql_data: