services:
  db:
    image: mysql:latest
    container_name: mysql_server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: my_project_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  web: 
    image: nginx:latest
    container_name: nginx_server
    restart: always
    ports:
      - "80:80"
    depends_on:
      - db

volumes:
  mysql_data: