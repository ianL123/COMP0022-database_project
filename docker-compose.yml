services:
  db:
    image: mysql:latest
    container_name: mysql_server
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: password123
      MYSQL_DATABASE: my_project_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./ml-latest:/var/lib/mysql-files/ml-latest
      - ./personality-isf2018:/var/lib/mysql-files/personality-isf2018
      - ./user-system:/var/lib/mysql-files/user-system

  app:
    build: .
    container_name: python_app
    depends_on:
      - db
    ports:
      - "5001:5000"
    env_file: .env
    environment:
      - PYTHONUNBUFFERED=1
  
  web:
    image: nginx:latest
    container_name: nginx_server
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app

volumes:
  mysql_data:
